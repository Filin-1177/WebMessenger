<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>hash-api</title>
    <!-- без стилей, без декораций — чистый минимализм -->
</head>
<body>
<pre id="output">Loading...</pre>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const string = params.get('string');
        const algo = (params.get('algo') || 'sha256').toLowerCase();
        const raw = params.has('raw');

        const supported = {
            md5: () => CryptoJS.MD5(string).toString(),
            sha1: () => CryptoJS.SHA1(string).toString(),
            sha256: () => CryptoJS.SHA256(string).toString(),
            sha512: () => CryptoJS.SHA512(string).toString(),
            sha3: () => CryptoJS.SHA3(string).toString(),
            ripemd160: () => CryptoJS.RIPEMD160(string).toString()
        };

        const output = document.getElementById('output');

        if (!string) {
            const msg = 'Usage: ?string=text&algo=sha256&raw\nSupported algos: ' + Object.keys(supported).join(', ');
            if (raw) {
                document.body.textContent = msg;
            } else {
                output.textContent = msg;
            }
            return;
        }

        if (!supported[algo]) {
            const err = 'Unsupported algo: ' + algo + '. Supported: ' + Object.keys(supported).join(', ');
            if (raw) {
                document.body.textContent = err;
            } else {
                output.textContent = err;
            }
            return;
        }

        const hash = supported[algo]();

        if (raw) {
            // возвращаем только хеш, без HTML-обёртки
            document.body.textContent = hash;
        } else {
            output.textContent = 'string: ' + string + '\nalgo: ' + algo + '\nhash: ' + hash;
        }
    })();
</script>
</body>
</html>
